[databases]
aarxdb = host=127.0.0.1 port=5432 dbname=aarxdb

[pgbouncer]
listen_addr = 127.0.0.1
listen_port = 6432

; ✅ SCRAM-SHA-256: Matches PostgreSQL 14+ default encryption
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; ✅ Transaction mode: Best for Django high-concurrency
pool_mode = transaction

; ✅ Final Production Values:
; max_client_conn = frontend (app users) connections
; default_pool_size = real PostgreSQL backend connections
max_client_conn = 1000
default_pool_size = 50
reserve_pool_size = 10
reserve_pool_timeout = 5

; ✅ Idle transaction timeout — kills hung transactions (hidden bug fix)
query_timeout = 30
client_idle_timeout = 60
server_idle_timeout = 600

log_connections = 0
log_disconnections = 0
verbose = 0
admin_users = postgres, aarxuser

; ✅ PID and Socket paths
pidfile = /var/run/postgresql/pgbouncer.pid
unix_socket_dir = /var/run/postgresql
